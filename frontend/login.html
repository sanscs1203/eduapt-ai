<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EduAdapt AI – Login</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="login-page">

  <!-- Animated background grid -->
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="login-container">
    <div class="login-card">

      <!-- Logo -->
      <div class="login-logo">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <path d="M14 2L24 8V20L14 26L4 20V8L14 2Z" stroke="#3B82F6" stroke-width="1.5" fill="none"/>
            <path d="M14 7L20 10.5V17.5L14 21L8 17.5V10.5L14 7Z" fill="#3B82F6" opacity="0.3"/>
            <circle cx="14" cy="14" r="3" fill="#3B82F6"/>
          </svg>
        </div>
        <span class="logo-text">EduAdapt<span class="logo-ai">AI</span></span>
      </div>

      <!-- Heading -->
      <div class="login-heading">
        <h1>Bienvenido de vuelta</h1>
        <p>Tutor Inteligente con Aprendizaje Personalizado</p>
      </div>

      <!-- Form -->
      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label for="username">Nombre completo</label>
          <div class="input-wrapper">
            <!-- Icono de usuario (persona) -->
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="username" placeholder="Tu nombre completo" autocomplete="off"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input type="password" id="password" placeholder="Ingresa tu contraseña"/>
            <button type="button" class="toggle-pass" id="togglePass">
              <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="error-msg" id="errorMsg">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          Nombre o contraseña incorrectos
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-loader" id="btnLoader">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="spin">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </span>
        </button>
      </form>

      <!-- Register link -->
      <div class="login-register">
        ¿No tienes cuenta?
        <a href="register.html">Crear cuenta nueva</a>
      </div>

      <!-- Hint -->
      <div class="login-hint">
        <span>Nota:</span> Ingresa el mismo nombre que usaste al registrarte
      </div>

    </div>
  </div>

  <script type="module" src="js/firebase-init.js"></script>
  <script type="module" src="js/config.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/login.js"></script>
</body>
</html>
